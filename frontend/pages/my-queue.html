<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 21c-4.5 0-8-2.6-8-6 0 0 2.4.4 4 1.6C10.7 11.7 12 9 12 9s1.3 2.7 4 7.6c1.6-1.2 4-1.6 4-1.6 0 3.4-3.5 6-8 6Z' fill='%236c5ce7'/></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JavaXd · คิวของฉัน</title>
<link rel="stylesheet" href="../assets/theme.css?v=1">
<style>
/* ============ คิวของฉัน — หน้าเดียวของ Therapist ============
   หมอนวดเห็นเฉพาะงานของตัวเอง: คิววันนี้ · เริ่ม/จบงาน · กะ · ค่ามือ · ขอลา
   ไม่เห็นคิวคนอื่น / เงินร้าน / รายชื่อลูกค้าทั้งหมด
   ── API ที่ใช้ ──
   GET  /therapist                          → หา record ของตัวเอง (match userId)
   GET  /dashboard/schedule?date={today}    → ตารางวันนี้ → กรองเฉพาะแถวตัวเอง
   PATCH /walk-in/{queueId}/start           → ปุ่ม "เริ่มงาน"
   PATCH /walk-in/{queueId}/complete        → ปุ่ม "จบงาน"  (ถ้า backend ใช้ชื่ออื่น แก้ที่ MYQ.done)
   GET  /therapist/{id}/schedules           → กะประจำสัปดาห์ของฉัน
   POST /therapist/{id}/leaves              → ขอลา (รออนุมัติจากผู้จัดการ)
   GET  /report/therapist-performance       → ค่ามือ/ค่าคอมของฉันเดือนนี้
   POST /auth/link-token                    → ผูก LINE (ปุ่มใน accountPanel ก็มี)
   SignalR: QueueUpdated → โหลดคิวใหม่อัตโนมัติ */
.mq-hero{background:linear-gradient(135deg,#2a2456,#3b2f7a 60%,#5b4bd6);border-radius:20px;color:#fff;padding:24px 26px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:20px;position:relative;overflow:hidden}
.mq-hero::after{content:'';position:absolute;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.07);top:-90px;right:-70px}
.mq-hero h2{font-size:22px;font-weight:800}
.mq-hero .sub2{font-size:13px;color:#c5c0ea;margin-top:3px}
.mq-hero .right{margin-left:auto;display:flex;gap:10px;position:relative;z-index:2;flex-wrap:wrap}
.mq-hero .btn{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.25)}
.mq-hero .btn:hover{background:rgba(255,255,255,.22)}
.mq-job{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:16px 18px;margin-bottom:12px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;transition:.15s}
.mq-job.now{border-color:var(--brand);box-shadow:0 8px 26px rgba(108,92,231,.18)}
.mq-job .tm{text-align:center;min-width:74px}
.mq-job .tm b{font-size:17px;font-weight:800;display:block}
.mq-job .tm span{font-size:11px;color:var(--ink-3)}
.mq-job .info{flex:1;min-width:180px}
.mq-job .nm{font-weight:700;font-size:15px}
.mq-job .sv{font-size:12.5px;color:var(--ink-2);margin-top:2px}
.mq-note{display:inline-flex;align-items:center;gap:6px;background:#fdf3e8;border:1px solid #f0d9b8;color:#9a6a1a;font-size:12px;font-weight:600;border-radius:9px;padding:4px 10px;margin-top:7px}
.mq-act .btn{height:42px;padding:0 18px}
.mq-done{color:#178a61;font-weight:700;font-size:13px;display:inline-flex;align-items:center;gap:6px}
.shift-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
@media(max-width:800px){.shift-grid{grid-template-columns:repeat(4,1fr)}}
.shift-d{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center}
.shift-d.today{border-color:var(--brand);background:var(--brand-soft)}
.shift-d.off{opacity:.5}
.shift-d b{font-size:12.5px;font-weight:700;display:block}
.shift-d span{font-size:11px;color:var(--ink-2)}
</style>
</head>
<body data-title="คิวของฉัน">

<template id="page">
  <div class="mq-hero">
    <span id="mqAv"></span>
    <div><h2 id="mqHi">สวัสดี 👋</h2><div class="sub2" id="mqDate"></div></div>
    <div class="right">
      <button class="btn" onclick="BS.linkMyLine()" data-i="line">ผูก LINE รับแจ้งเตือน</button>
      <button class="btn" onclick="MYQ.leave()" data-i="cal">ขอลางาน</button>
    </div>
  </div>

  <div class="stat-grid" style="margin-bottom:20px">
    <div class="stat"><div class="row1"><div class="ic ic-purple" data-i="cal"></div><span class="tt">คิวของฉันวันนี้</span></div><div class="val" id="kJobs">—</div><div class="row3"><span class="from" id="kJobsSub"></span></div></div>
    <div class="stat"><div class="row1"><div class="ic ic-green" data-i="check"></div><span class="tt">เสร็จแล้ว</span></div><div class="val" id="kDone">—</div><div class="row3"><span class="from">งานที่จบวันนี้</span></div></div>
    <div class="stat"><div class="row1"><div class="ic ic-orange" data-i="money"></div><span class="tt">ค่ามือเดือนนี้</span></div><div class="val" id="kComm">—</div><div class="row3"><span class="from" id="kCommSub">จากระบบรายงาน</span></div></div>
    <div class="stat"><div class="row1"><div class="ic ic-blue" data-i="star"></div><span class="tt">เรตติ้งของฉัน</span></div><div class="val" id="kRate">—</div><div class="row3"><span class="from" id="kRateSub"></span></div></div>
  </div>

  <div class="card card-pad mb24">
    <div class="card-h"><h3>งานที่ได้รับมอบหมายวันนี้</h3><span class="sp muted" style="font-size:12.5px">กด "เริ่มงาน" เมื่อรับลูกค้า · "จบงาน" เมื่อเสร็จ</span></div>
    <div id="mqJobs"><div style="text-align:center;color:var(--ink-3);padding:24px;font-size:13px">กำลังโหลด...</div></div>
  </div>

  <div class="card card-pad">
    <div class="card-h"><h3>กะการทำงานของฉัน (สัปดาห์นี้)</h3><span class="sp muted" style="font-size:12.5px">ติดต่อผู้จัดการหากต้องการสลับกะ</span></div>
    <div class="shift-grid" id="mqShift"></div>
  </div>
</template>

<script>window.BASE='../';window.PAGE='myqueue';</script>
<script>if(!localStorage.getItem('th_auth'))location.href='../login.html';</script>
<script>
window.PAGE_INIT=function(){
  document.querySelectorAll('[data-i]').forEach(e=>{const t=e.textContent.trim();e.innerHTML=svg(e.dataset.i)+(t?'<span>'+t+'</span>':'')});
  const u=(window.API&&API.getUser&&API.getUser())||{};
  const myName=u.displayName||'หมอนวด';
  document.getElementById('mqAv').innerHTML=av(myName,56,true,u.avatarUrl);
  document.getElementById('mqHi').textContent='สวัสดี '+myName+' 👋';
  document.getElementById('mqDate').textContent=new Date().toLocaleDateString('th-TH',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  window.MYQ={me:null,jobs:[]};

  /* ---------- หา record หมอนวดของตัวเอง ---------- */
  async function findMe(){
    try{const list=await API.get('/therapist')||[];
      MYQ.me=list.find(t=>t.userId&&u.id&&t.userId===u.id)||list.find(t=>t.displayName===myName)||null;
    }catch(e){}
  }

  /* ---------- คิวของฉันวันนี้ (กรองจากตารางรวม — backend เห็นทั้งหมด แต่หน้านี้แสดงเฉพาะของฉัน) ---------- */
  async function loadJobs(){
    let jobs=[];
    try{
      const sch=await API.get('/dashboard/schedule');
      const mine=(sch.therapists||[]).find(t=>(MYQ.me&&t.id===MYQ.me.id)||t.displayName===myName);
      jobs=((mine&&(mine.blocks||mine.items||mine.jobs))||[]).map(b=>({
        id:b.queueId||b.walkInId||b.id,
        start:(b.start||b.startTime||'').toString().slice(0,5)||API.fmtTime(b.start),
        end:(b.end||b.endTime||'').toString().slice(0,5)||API.fmtTime(b.end),
        cust:b.customerName||(b.customer&&b.customer.displayName)||'ลูกค้า',
        svc:b.serviceName||(b.service&&b.service.name)||b.label||'-',
        notes:b.customerNotes||b.notes||'',
        status:b.status!=null?b.status:(b.state||0), // 0 รอ · 1 กำลังทำ · 2 เสร็จ
      }));
    }catch(e){}
    MYQ.jobs=jobs;
    render();
  }
  function render(){
    const J=MYQ.jobs;
    document.getElementById('kJobs').innerHTML=J.length+' <small>งาน</small>';
    document.getElementById('kJobsSub').textContent=J.length?('ถัดไป '+(J.find(j=>j.status<2)?.start||'—')+' น.'):'วันนี้ยังไม่มีงาน';
    const done=J.filter(j=>j.status===2||j.status==='Completed').length;
    document.getElementById('kDone').innerHTML=done+' <small>งาน</small>';
    // การ์ดคลิกดูรายละเอียดได้ (reuse modal เดียวกับหน้าอื่น)
    const stTxt=s=>(s===2||s==='Completed')?'✓ เสร็จ':(s===1||s==='InService')?'กำลังทำ':'รอคิว';
    BS.statDetails([
      {title:'คิวของฉันวันนี้ · '+J.length+' งาน',sub:'เรียงตามเวลา',rows:J.length?J.map(j=>[(j.start||'-')+' น. · '+(j.cust||j.customerName||'ลูกค้า'),stTxt(j.status)]):[['วันนี้ยังไม่มีงาน','—']]},
      {title:'เสร็จแล้ว · '+done+' งาน',sub:'งานที่จบวันนี้',rows:done?J.filter(j=>j.status===2||j.status==='Completed').map(j=>[(j.cust||j.customerName||'ลูกค้า'),(j.svc||j.serviceName||'')]):[['ยังไม่มีงานที่จบ','—']]},
      {title:'ค่ามือเดือนนี้',sub:'คำนวณจากบิลที่ชำระแล้วจริง',rows:[['ที่มาตัวเลข','ระบบรายงานค่าคอมมิชชัน'],['สูตร','% หรือเรทคงที่ตามบริการ']]},
      {title:'เรตติ้งของฉัน',sub:'คะแนนจากลูกค้าจริง',rows:[['ที่มา','รีวิวหลังจบงาน'],['อัปเดต','ทุกครั้งที่มีรีวิวใหม่']]},
    ]);
    document.getElementById('mqJobs').innerHTML=J.length?J.map(j=>{
      const doing=j.status===1||j.status==='InService';
      const fin=j.status===2||j.status==='Completed';
      return `<div class="mq-job${doing?' now':''}">
        <div class="tm"><b>${j.start||'-'}</b><span>ถึง ${j.end||'-'}</span></div>
        <div class="info"><div class="nm">${j.cust}</div><div class="sv">${j.svc}</div>
          ${j.notes?`<div class="mq-note">⚠ ${j.notes}</div>`:''}</div>
        <div class="mq-act">
          ${fin?`<span class="mq-done">${svg('check')} เสร็จสิ้น</span>`
            :doing?`<button class="btn btn-pri" onclick="MYQ.done('${j.id}')">${svg('check')} จบงาน</button>`
            :`<button class="btn btn-soft" onclick="MYQ.start('${j.id}')">เริ่มงาน</button>`}
        </div>
      </div>`;
    }).join(''):'<div style="text-align:center;color:var(--ink-3);padding:26px;font-size:13.5px">วันนี้ยังไม่มีคิวที่ได้รับมอบหมาย พักผ่อนได้เลย 🌿</div>';
  }
  /* เริ่ม/จบงาน — เปลี่ยนสถานะคิวของตัวเอง */
  MYQ.start=async function(id){
    try{await API.patch('/walk-in/'+id+'/start');BS.toast('เริ่มงานแล้ว · ขอให้บริการอย่างมีความสุข');loadJobs();}
    catch(e){BS.toast('ไม่สำเร็จ: '+e.message,'x');}
  };
  MYQ.done=async function(id){
    try{await API.patch('/walk-in/'+id+'/complete');BS.toast('จบงานแล้ว · แจ้งหน้าร้านเก็บเงินให้เรียบร้อย','check');loadJobs();}
    catch(e){BS.toast('ไม่สำเร็จ: '+e.message,'x');}
  };

  /* ---------- กะของฉัน ---------- */
  async function loadShift(){
    const days=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];
    let sc=[];if(MYQ.me)try{sc=await API.get('/therapist/'+MYQ.me.id+'/schedules')||[];}catch(e){}
    const byDow={};sc.forEach(s=>byDow[s.dayOfWeek]=s);
    const todayDow=new Date().getDay();
    document.getElementById('mqShift').innerHTML=days.map((d,i)=>{
      const s=byDow[i];const on=s?s.isWorkday:(i!==0);
      return `<div class="shift-d${i===todayDow?' today':''}${on?'':' off'}"><b>${d}</b><span>${on?((s&&s.startTime)||'10:00').slice(0,5)+' - '+((s&&s.endTime)||'22:00').slice(0,5):'หยุด'}</span></div>`;
    }).join('');
  }

  /* ---------- ค่ามือ + เรตติ้งของฉัน ---------- */
  async function loadPerf(){
    try{const r=await API.get('/report/therapist-performance');
      const mine=(r.performance||[]).find(p=>(MYQ.me&&p.therapistId===MYQ.me.id)||p.therapistName===myName);
      if(mine){document.getElementById('kComm').innerHTML=API.baht(Math.round(mine.totalCommission||0))+' <small>฿</small>';
        document.getElementById('kCommSub').textContent='จาก '+(mine.totalJobs||0)+' งานเดือนนี้';}
    }catch(e){}
    try{const rv=await API.get('/review/therapists')||[];
      const mine=rv.find(x=>MYQ.me&&x.therapistId===MYQ.me.id);
      if(mine){document.getElementById('kRate').innerHTML=(mine.average||0).toFixed(1)+' <small>★</small>';
        document.getElementById('kRateSub').textContent='จาก '+(mine.count||0)+' รีวิว';}
    }catch(e){}
  }

  /* ---------- ขอลา (ของตัวเอง — รออนุมัติ ไม่ approve อัตโนมัติ) ---------- */
  MYQ.leave=function(){
    if(!MYQ.me){BS.toast('ไม่พบโปรไฟล์หมอนวดของบัญชีนี้ — แจ้งผู้จัดการให้ผูกบัญชี','x');return;}
    const today=(d=>new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10))(new Date());
    BS.modal({title:'ขอลางาน',sub:'คำขอจะส่งให้ผู้จัดการอนุมัติ',w:440,
      body:`<div class="field"><label>วันที่ลา</label><input type="date" id="lvDate" value="${today}"></div>
        <div class="field"><label>ประเภท</label><div class="seg-full" id="lvType"><button class="on" data-v="0">ลาทั้งวัน</button><button data-v="1">ลาบางช่วง</button></div></div>
        <div class="grid2" id="lvTimes" style="display:none"><div class="field"><label>ตั้งแต่</label><input type="time" id="lvStart" value="10:00"></div><div class="field"><label>ถึง</label><input type="time" id="lvEnd" value="14:00"></div></div>
        <div class="field"><label>เหตุผล</label><textarea id="lvReason" rows="2" placeholder="เช่น ลาป่วย, ธุระส่วนตัว"></textarea></div>
        <div id="lvList"></div>`,
      foot:`<button class="btn btn-ghost" onclick="BS.closeModal()">ยกเลิก</button>
        <button class="btn btn-pri" onclick="MYQ.sendLeave()">${svg('check')} ส่งคำขอลา</button>`});
    setTimeout(()=>{
      document.querySelectorAll('#lvType button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#lvType button').forEach(x=>x.classList.remove('on'));b.classList.add('on');document.getElementById('lvTimes').style.display=b.dataset.v==='1'?'grid':'none';});
      (async()=>{try{const lv=await API.get('/therapist/'+MYQ.me.id+'/leaves')||[];const el=document.getElementById('lvList');
        const stT={0:'รออนุมัติ',1:'อนุมัติแล้ว',2:'ไม่อนุมัติ'},stC={0:'b-orange',1:'b-green',2:'b-red'};
        if(el&&lv.length)el.innerHTML='<div class="sub" style="font-size:12px;margin:6px 0">การลาล่าสุดของฉัน</div>'+lv.slice(0,3).map(l=>`<div class="flex ac jb" style="padding:6px 0;font-size:12.5px"><span>${API.fmtDate(l.leaveDate)}</span><span class="badge ${stC[l.status]||'b-gray'}">${stT[l.status]||'-'}</span></div>`).join('');
      }catch(e){}})();
    },40);
  };
  MYQ.sendLeave=async function(){
    const date=document.getElementById('lvDate').value;
    const full=(document.querySelector('#lvType button.on')||{}).dataset.v!=='1';
    if(!date){BS.toast('เลือกวันที่ลา','x');return;}
    const body={leaveDate:date,leaveType:full?0:1,reason:document.getElementById('lvReason').value.trim()||null,
      startTime:full?null:document.getElementById('lvStart').value+':00',endTime:full?null:document.getElementById('lvEnd').value+':00'};
    try{await API.post('/therapist/'+MYQ.me.id+'/leaves',body);BS.closeModal();BS.toast('ส่งคำขอลาแล้ว · รอผู้จัดการอนุมัติ');}
    catch(e){BS.toast('ส่งไม่สำเร็จ: '+e.message,'x');}
  };

  (async()=>{await findMe();loadJobs();loadShift();loadPerf();})();
  if(window.RT)RT.onUpdate(function(){clearTimeout(window._mqRt);window._mqRt=setTimeout(loadJobs,600);});
};
</script>
<script src="../assets/api.js?v=2"></script>
<script src="../assets/shell.js?v=12"></script>
</body>
</html>
