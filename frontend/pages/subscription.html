<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 21c-4.5 0-8-2.6-8-6 0 0 2.4.4 4 1.6C10.7 11.7 12 9 12 9s1.3 2.7 4 7.6c1.6-1.2 4-1.6 4-1.6 0 3.4-3.5 6-8 6Z' fill='%236c5ce7'/></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JavaXd · แพ็กเกจการใช้งาน</title>
<link rel="stylesheet" href="../assets/theme.css?v=1">
<style>
.sub-hero{background:linear-gradient(135deg,#2a2456 0%,#3b2f7a 55%,#5b4bd6 100%);border-radius:24px;padding:34px 36px;color:#fff;position:relative;overflow:hidden;margin-bottom:26px}
.sub-hero::after{content:'';position:absolute;right:-60px;top:-60px;width:280px;height:280px;border-radius:50%;background:rgba(255,255,255,.07)}
.sub-hero::before{content:'';position:absolute;right:80px;bottom:-90px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.05)}
.sub-hero .pill{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.15);padding:6px 13px;border-radius:20px;font-size:12.5px;font-weight:600;margin-bottom:14px}
.sub-hero .pill svg{width:15px;height:15px}
.sub-hero h2{font-size:30px;font-weight:800;line-height:1.2;max-width:620px;letter-spacing:-.01em}
.sub-hero p{font-size:14.5px;opacity:.9;margin-top:10px;max-width:560px}
.sub-hero .proof{display:flex;gap:26px;margin-top:22px;flex-wrap:wrap;position:relative;z-index:2}
.sub-hero .proof .n{font-size:22px;font-weight:800}
.sub-hero .proof .l{font-size:12px;opacity:.8}

.unlock-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:30px}
@media(max-width:1100px){.unlock-grid{grid-template-columns:repeat(3,1fr)}}
.unlock{background:#fff;border:1px solid var(--line);border-radius:15px;box-shadow:var(--shadow);padding:16px;text-align:center}
.unlock .ic{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;margin:0 auto 10px}
.unlock .ic svg{width:22px;height:22px}
.unlock h4{font-size:13px;font-weight:600}
.unlock p{font-size:11px;color:var(--ink-3);margin-top:3px;line-height:1.4}

.bill-toggle{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:26px}
.bill-toggle .seg button{padding:9px 20px}
.save-tag{background:var(--green-soft);color:#178a61;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px}

.plans{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:36px;align-items:start}
@media(max-width:1100px){.plans{grid-template-columns:1fr}}
.plan{background:#fff;border:1.5px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:26px 24px;display:flex;flex-direction:column;position:relative;transition:.18s}
.plan:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px)}
.plan.pop{border-color:var(--brand);box-shadow:0 14px 40px rgba(108,92,231,.22);transform:scale(1.015)}
.plan.pop:hover{transform:scale(1.015) translateY(-3px)}
.plan .crown{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:var(--brand-grad);color:#fff;font-size:12px;font-weight:700;padding:5px 16px;border-radius:20px;box-shadow:0 6px 16px rgba(108,92,231,.4);white-space:nowrap;display:flex;align-items:center;gap:6px}
.plan .crown svg{width:14px;height:14px}
.plan .p-name{font-size:19px;font-weight:800}
.plan .p-en{font-size:12px;color:var(--ink-3);font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.plan .p-desc{font-size:12.5px;color:var(--ink-2);margin-top:8px;min-height:36px;line-height:1.5}
.plan .p-price{margin:16px 0 6px;display:flex;align-items:flex-end;gap:6px}
.plan .p-price .amt{font-size:38px;font-weight:800;letter-spacing:-.02em;line-height:1}
.plan .p-price .per{font-size:13px;color:var(--ink-3);font-weight:500;padding-bottom:5px}
.plan .p-strike{font-size:12.5px;color:var(--ink-3);min-height:18px}
.plan .p-strike s{margin-right:6px}
.plan .p-strike .ann{color:#178a61;font-weight:600}
.plan .btn{width:100%;margin:18px 0;height:46px}
.plan .feats{display:flex;flex-direction:column;gap:11px}
.plan .feats .f{display:flex;gap:10px;font-size:13px;color:var(--ink)}
.plan .feats .f .ck{width:19px;height:19px;border-radius:6px;background:var(--green-soft);color:#178a61;display:grid;place-items:center;flex:0 0 19px;margin-top:1px}
.plan .feats .f .ck svg{width:13px;height:13px}
.plan.pop .feats .f .ck{background:var(--brand-soft);color:var(--brand)}
.plan .feats .f.bold{font-weight:600}
.plan-foot{margin-top:auto;padding-top:16px}

.compare th:first-child{width:40%}
.compare td.c,.compare th.c{text-align:center}
.compare .yes{color:var(--green);display:inline-flex}.compare .yes svg{width:18px;height:18px}
.compare .no{color:#cbd0e0}
.compare .pop-col{background:var(--brand-soft)}
.compare thead th.pop-col{color:var(--brand-700)}

.faq{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:900px){.faq{grid-template-columns:1fr}}
.faq .q{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.faq .q b{font-size:13.5px;font-weight:600;display:block;margin-bottom:5px}
.faq .q p{font-size:12.5px;color:var(--ink-2);line-height:1.55}

.guarantee{display:flex;align-items:center;gap:14px;background:var(--green-soft);border:1px solid #cdeede;border-radius:16px;padding:16px 20px;margin-bottom:30px}
.guarantee .ic{width:44px;height:44px;border-radius:12px;background:#fff;color:#178a61;display:grid;place-items:center;flex:0 0 44px}

.co-plan{display:flex;align-items:center;gap:13px;padding:14px;border:1px solid var(--line);border-radius:14px;background:var(--card-2);margin-bottom:16px}
.co-qr{text-align:center;padding:16px;background:var(--card-2);border:1px solid var(--line);border-radius:14px}
.co-qr .box{width:160px;height:160px;margin:10px auto;background:#fff;border:1px solid var(--line-2);border-radius:12px;display:grid;place-items:center}
.co-qr .box svg{width:120px;height:120px;color:#1a2138}
.co-row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;color:var(--ink-2)}
.co-row.tot{font-size:16px;font-weight:700;color:var(--ink);border-top:1px dashed var(--line-2);margin-top:6px;padding-top:11px}
.co-row.tot b{color:var(--brand-700)}
</style>
</head>
<body data-title="แพ็กเกจการใช้งาน">

<template id="page">
  <div class="sub-hero">
    <div class="pill"><span>แพ็กเกจปัจจุบัน · เริ่มต้น (ฟรี)</span></div>
    <h2>ปลดล็อกระบบจัดการร้านนวดแบบเต็มรูปแบบ ในราคาคืนทุนแค่บิลเดียว</h2>
    <p>รับชำระผ่านพร้อมเพย์ ออกใบกำกับภาษีอัตโนมัติ เปิดจองคิวออนไลน์ 24 ชม. และดูกำไรเชิงลึก — ทุกอย่างที่ทำให้ร้านคุณดูเป็นมืออาชีพและโตเร็วขึ้น</p>
    <div class="proof">
      <div><div class="n" id="pf1">1,284</div><div class="l">ร้านนวด &amp; สปาทั่วไทยใช้งาน</div></div>
      <div><div class="n">+32%</div><div class="l">รายได้เฉลี่ยที่เพิ่มขึ้น*</div></div>
      <div><div class="n">4.9 ★</div><div class="l">คะแนนความพึงพอใจ</div></div>
      <div><div class="n">14 วัน</div><div class="l">ทดลองใช้ฟรี ไม่ผูกมัด</div></div>
    </div>
  </div>

  <h3 style="font-size:16px;font-weight:700;margin-bottom:16px">ฟีเจอร์ที่ปลดล็อกเมื่ออัปเกรด</h3>
  <div class="unlock-grid" id="unlock"></div>

  <div class="bill-toggle">
    <span style="font-weight:600;font-size:14px">เลือกรอบบิล</span>
    <div class="seg" id="cycle"><button class="on" data-c="m">รายเดือน</button><button data-c="y">รายปี</button></div>
    <span class="save-tag">ประหยัด 20% · ฟรี 2 เดือน</span>
  </div>

  <div class="plans" id="plans"></div>

  <div class="guarantee">
    <div class="ic"></div>
    <div><b style="font-size:14px">รับประกันความคุ้มค่า · ยกเลิกได้ทุกเมื่อ</b>
    <div class="sub" style="font-size:12.5px;margin-top:2px">ทดลองใช้ฟรี 14 วันเต็มทุกฟีเจอร์ ไม่ต้องผูกบัตร · ข้อมูลทั้งหมดเป็นของคุณ ส่งออกได้ตลอดเวลา</div></div>
    <button class="btn btn-soft mla" onclick="document.getElementById('plans').scrollIntoView({behavior:'smooth',block:'center'})" style="align-self:center">เริ่มทดลองฟรี</button>
  </div>

  <div class="card card-pad" style="margin-bottom:30px">
    <div class="card-h"><h3>เปรียบเทียบทุกแพ็กเกจ</h3><span class="sp muted" style="font-size:12.5px">เลือกที่เหมาะกับขนาดร้านของคุณ</span></div>
    <table class="tbl compare" id="compare"></table>
  </div>

  <h3 style="font-size:16px;font-weight:700;margin-bottom:16px">คำถามที่พบบ่อย</h3>
  <div class="faq" id="faq"></div>
</template>

<script>window.BASE='../';window.PAGE='subscription';</script>
<script>if(!localStorage.getItem('th_auth'))location.href=(window.BASE||'')+'login.html';</script>
<script>
window.PAGE_INIT=function(){
  document.querySelectorAll('[data-i]').forEach(e=>{const t=e.textContent.trim();e.innerHTML=svg(e.dataset.i)+(t?'<span>'+t+'</span>':'')});
  document.querySelector('.sub-hero .pill').insertAdjacentHTML('afterbegin',svg('gem'));
  document.querySelector('.guarantee .ic').innerHTML=svg('check');
  (function(){try{var b=document.createElement('div');b.style.cssText='background:#eef6ff;border:1px solid #bcd9f5;color:#1a5a8a;border-radius:12px;padding:11px 15px;margin-bottom:16px;font-size:13px;font-weight:500';b.innerHTML='ℹ️ เปลี่ยน/อัปเกรดแพ็กเกจได้จริง (บันทึกลงระบบ) · ส่วนการตัดเงินจริงผ่านบัตร/พร้อมเพย์ ต้องเชื่อม Payment Gateway เพิ่ม';var h=document.querySelector('.page-h')||document.querySelector('.sub-hero');if(h&&h.parentNode)h.parentNode.insertBefore(b,h);}catch(e){}})();
  // แพ็กเกจปัจจุบันจริงจาก /subscription
  const PLANMAP={Free:'starter',Starter:'starter',Professional:'standard',Enterprise:'growth'};
  window.CURKEY='starter';
  async function loadCurrentPlan(){try{const s=await API.get('/subscription');window.CURKEY=PLANMAP[s.planType]||'starter';
    const p=document.querySelector('.sub-hero .pill');if(p)p.innerHTML=svg('gem')+'<span>แพ็กเกจปัจจุบัน: '+(s.planType||'Free')+(s.trialEndsAt?' (ทดลอง)':'')+'</span>';
    if(window.renderPlans)renderPlans();
  }catch(e){}}
  setTimeout(loadCurrentPlan,80);

  // unlock features
  const U=[
    ['qr','#3b9bff','พร้อมเพย์ QR','รับเงินเข้าบัญชีร้านทันที'],
    ['receipt','#22b07d','ใบกำกับภาษี','ออก & พิมพ์อัตโนมัติ'],
    ['cal','#8b5cf6','จองออนไลน์ 24 ชม.','ลูกค้าจองเองผ่านเว็บ/Line'],
    ['line','#06c755','Line OA','แจ้งเตือน & ยืนยันคิว'],
    ['box','#f5a623','หลายสาขา','จัดการรวมศูนย์'],
    ['chart','#ec5f86','รายงานเชิงลึก','กำไร & พฤติกรรมลูกค้า'],
  ];
  document.getElementById('unlock').innerHTML=U.map(u=>`
    <div class="unlock"><div class="ic" style="background:${u[1]}1f;color:${u[1]}">${svg(u[0])}</div>
      <h4>${u[2]}</h4><p>${u[3]}</p></div>`).join('');

  // plans
  const PLANS=[
    {key:'starter',name:'เริ่มต้น',en:'Starter',m:0,y:0,desc:'จัดการคิวและการจองพื้นฐาน เหมาะกับร้านเปิดใหม่',current:true,
      feats:[['จัดการคิวหน้าร้าน (Walk-in)',1],['ตารางงานหมอนวดรายวัน',0],['ฐานข้อมูลลูกค้า สูงสุด 200 ราย',0],['รายงานยอดขายพื้นฐาน',0],['ผู้ใช้งาน 2 บัญชี',0]]},
    {key:'standard',name:'มาตรฐาน',en:'Standard',m:590,y:5664,popular:true,desc:'ครบเครื่องสำหรับร้านที่เปิดบริการเต็มรูปแบบ',
      feats:[['ทุกอย่างในแพ็กเกจเริ่มต้น',1],['รับชำระพร้อมเพย์ + ออกใบกำกับภาษี',0],['เชื่อม Line OA แจ้งเตือน & ยืนยันคิว',0],['ขายคอร์ส & แพ็กเกจล่วงหน้า',0],['รายงานการเงิน & กำไรเชิงลึก',0],['ลูกค้าไม่จำกัด · ผู้ใช้ 8 บัญชี',0]]},
    {key:'growth',name:'เติบโต',en:'Growth',m:1290,y:12384,desc:'ขยายหลายสาขาและเปิดจองออนไลน์ 24 ชม.',
      feats:[['ทุกอย่างในแพ็กเกจมาตรฐาน',1],['ระบบจองคิวออนไลน์ 24 ชม. (เว็บ + Line)',0],['จัดการหลายสาขาในที่เดียว',0],['API เชื่อมต่อระบบภายนอก',0],['แดชบอร์ดเปรียบเทียบสาขา',0],['ทีมซัพพอร์ตดูแลเฉพาะ',0]]},
  ];
  let cycle='m';
  function renderPlans(){
    document.getElementById('plans').innerHTML=PLANS.map(p=>{
      const price=cycle==='m'?p.m:Math.round(p.y/12);
      const isFree=p.m===0;
      const strike = isFree?'<span class="muted">ใช้งานได้ทันที ไม่มีค่าใช้จ่าย</span>'
        : cycle==='y'?`<s>${fmt(p.m)} ฿</s><span class="ann">ชำระ ${fmt(p.y)} ฿/ปี · ประหยัด ${fmt(p.m*12-p.y)} ฿</span>`
        : `เทียบเท่าวันละ ~${Math.round(p.m/30)} บาท`;
      const isCurrent=(window.CURKEY||'starter')===p.key;
      const btn = isCurrent
        ? `<button class="btn btn-ghost" disabled style="opacity:.7">${svg('check')} แพ็กเกจปัจจุบัน</button>`
        : `<button class="btn ${p.popular?'btn-pri':'btn-soft'}" onclick="openCheckout('${p.key}')">${svg('gem')} ${p.popular?'อัปเกรดเลย — แนะนำ':'เลือกแพ็กเกจนี้'}</button>`;
      return `<div class="plan${p.popular?' pop':''}">
        ${p.popular?`<div class="crown">${svg('star')} นิยมที่สุด</div>`:''}
        <div class="p-name">${p.name}</div><div class="p-en">${p.en}</div>
        <div class="p-desc">${p.desc}</div>
        <div class="p-price"><span class="amt">${isFree?'ฟรี':'฿'+fmt(price)}</span>${isFree?'':'<span class="per">/ เดือน</span>'}</div>
        <div class="p-strike">${strike}</div>
        ${btn}
        <div class="feats">${p.feats.map(f=>`<div class="f${f[1]?' bold':''}"><span class="ck">${svg('check')}</span><span>${f[0]}</span></div>`).join('')}</div>
        <div class="plan-foot"></div>
      </div>`;
    }).join('');
  }
  renderPlans();
  document.querySelectorAll('#cycle button').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('#cycle button').forEach(x=>x.classList.remove('on'));b.classList.add('on');cycle=b.dataset.c;renderPlans();
  });

  // comparison table
  const FEATS=[
    ['จำนวนลูกค้าในระบบ','200 ราย','ไม่จำกัด','ไม่จำกัด'],
    ['ผู้ใช้งาน (พนักงาน)','2 บัญชี','8 บัญชี','ไม่จำกัด'],
    ['จัดการคิว & ตารางหมอนวด',1,1,1],
    ['รับชำระพร้อมเพย์ QR',0,1,1],
    ['ออกใบเสร็จ / ใบกำกับภาษี',0,1,1],
    ['เชื่อมต่อ Line OA',0,1,1],
    ['ขายคอร์ส & แพ็กเกจ',0,1,1],
    ['รายงานการเงิน & กำไรเชิงลึก',0,1,1],
    ['ระบบจองคิวออนไลน์ 24 ชม.',0,0,1],
    ['จัดการหลายสาขา',0,0,1],
    ['API & การเชื่อมต่อภายนอก',0,0,1],
    ['ทีมซัพพอร์ตดูแลเฉพาะ',0,0,1],
  ];
  const cell=v=>v===1?'<span class="yes">'+svg('check')+'</span>':v===0?'<span class="no">—</span>':v;
  document.getElementById('compare').innerHTML=
    '<thead><tr><th>ฟีเจอร์</th><th class="c">เริ่มต้น</th><th class="c pop-col">มาตรฐาน</th><th class="c">เติบโต</th></tr></thead><tbody>'+
    FEATS.map(f=>`<tr><td style="font-weight:500">${f[0]}</td><td class="c">${cell(f[1])}</td><td class="c pop-col">${cell(f[2])}</td><td class="c">${cell(f[3])}</td></tr>`).join('')+'</tbody>';

  // faq
  const FAQ=[
    ['อัปเกรดแล้วข้อมูลเดิมหายไหม?','ไม่หายแน่นอน ข้อมูลลูกค้า การจอง และยอดขายทั้งหมดยังอยู่ครบ เพียงปลดล็อกฟีเจอร์เพิ่มทันทีหลังชำระเงิน'],
    ['ยกเลิกได้ตลอดไหม?','ได้ทุกเมื่อ ไม่มีสัญญาผูกมัด หากยกเลิกระบบจะใช้งานได้จนครบรอบบิลที่ชำระไว้'],
    ['ชำระเงินช่องทางไหนได้บ้าง?','พร้อมเพย์ QR, โอนธนาคาร และบัตรเครดิต/เดบิต ออกใบกำกับภาษีให้ทุกการชำระ'],
    ['ระบบจองออนไลน์ทำงานยังไง?','ลูกค้าเลือกบริการ หมอนวด และเวลาว่างได้เองผ่านเว็บหรือ Line OA คิวจะเข้าระบบอัตโนมัติแบบเรียลไทม์'],
  ];
  document.getElementById('faq').innerHTML=FAQ.map(f=>`<div class="q"><b>${f[0]}</b><p>${f[1]}</p></div>`).join('');

  // ---- checkout ----
  window.openCheckout=function(key){
    const p=PLANS.find(x=>x.key===key);
    const yearly=cycle==='y';
    const base=yearly?p.y:p.m;
    const promoOn=true; // launch promo
    const discount=promoOn?Math.round(base*0.4):0;
    const total=base-discount;
    BS.modal({
      title:'สมัครแพ็กเกจ '+p.name, sub:'ทดลองฟรี 14 วัน · เริ่มเก็บเงินรอบถัดไป · ยกเลิกได้ทุกเมื่อ', w:460,
      body:`
        <div class="co-plan">
          <div class="bi-ic" style="width:42px;height:42px;border-radius:12px;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center">${svg('gem')}</div>
          <div style="flex:1"><div style="font-weight:700;font-size:15px">แพ็กเกจ ${p.name} <span class="sub" style="font-weight:400">· ${yearly?'รายปี':'รายเดือน'}</span></div>
          <div class="sub" style="font-size:12px">${p.desc}</div></div>
        </div>
        <div class="field"><label>โค้ดส่วนลด</label><div style="display:flex;gap:8px"><input value="LAUNCH40" style="text-transform:uppercase"><button class="btn btn-soft btn-sm" onclick="BS.toast('ใช้โค้ด LAUNCH40 · ลด 40%')">ใช้แล้ว</button></div></div>
        <div class="co-qr" style="margin:16px 0">
          <span class="qr-tag" style="display:inline-flex;align-items:center;gap:6px;background:#003d6b;color:#fff;font-size:11px;font-weight:700;padding:4px 11px;border-radius:6px">Thai QR · PromptPay</span>
          <div class="box">${svg('qr')}</div>
          <div style="font-size:12px;color:var(--ink-3)">สแกนเพื่อชำระ · JavaXd Co., Ltd.</div>
        </div>
        <div style="padding:0 2px">
          <div class="co-row"><span>ราคาแพ็กเกจ (${yearly?'ต่อปี':'ต่อเดือน'})</span><span>${fmt(base)} ฿</span></div>
          ${discount?`<div class="co-row"><span>ส่วนลดโปรเปิดตัว LAUNCH40</span><span class="t-red">-${fmt(discount)} ฿</span></div>`:''}
          <div class="co-row tot"><span>ยอดชำระวันนี้</span><b>฿ 0 <span style="font-size:12px;font-weight:500;color:var(--ink-3)">(ฟรี 14 วัน)</span></b></div>
          <div class="sub" style="font-size:11.5px;text-align:center;margin-top:8px">หลังครบ 14 วัน จะเรียกเก็บ ${fmt(total)} ฿${yearly?'/ปี':'/เดือน'}</div>
        </div>`,
      foot:`<button class="btn btn-ghost" onclick="BS.closeModal()">ยกเลิก</button>
        <button class="btn btn-pri" onclick="confirmSub('${p.key}','${p.name}')">${svg('check')} ยืนยัน & เริ่มทดลอง 14 วัน</button>`
    });
  };
  // เปลี่ยนแพ็กเกจจริง → POST /subscription/select
  const KEY2PLAN={starter:'Starter',standard:'Professional',growth:'Enterprise'};
  window.confirmSub=async function(key,name){
    try{const r=await API.post('/subscription/select',{planType:KEY2PLAN[key]||'Starter',trial:true});
      BS.closeModal();BS.toast('เริ่มทดลองแพ็กเกจ '+name+' แล้ว 🎉','gem');
      window.CURKEY=key;renderPlans();
      const sp=document.querySelector('.sub-hero .pill span');if(sp)sp.textContent='แพ็กเกจปัจจุบัน: '+(r.planType||name)+' (ทดลอง)';
    }catch(e){BS.toast('ไม่สำเร็จ: '+e.message,'x');}
  };
};
</script>
<script src="../assets/api.js?v=2"></script>
<script src="../assets/shell.js?v=9"></script>
</body>
</html>
